<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bakrid Mubarak | Aftab Ansari</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
      background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      position:relative;
    }

    /* =========================
       GIFT SCREEN
    ========================== */

    .gift-screen{
      position:absolute;
      width:100%;
      height:100%;
      background:
      radial-gradient(circle at top,#1e293b,#020617 70%);
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      overflow:hidden;
      z-index:100;
      transition:1.5s;
    }

    .gift-glow{
      position:absolute;
      width:500px;
      height:500px;
      background:radial-gradient(circle,#22c55e33,transparent 70%);
      animation:rotateGlow 10s linear infinite;
    }

    @keyframes rotateGlow{
      100%{
        transform:rotate(360deg);
      }
    }

    /* GOATS */

    .goat{
      position:absolute;
      font-size:3rem;
      animation:floatGoat 4s ease-in-out infinite;
      filter:drop-shadow(0 0 10px #fff);
    }

    .goat1{
      top:18%;
      left:18%;
    }

    .goat2{
      top:20%;
      right:18%;
      animation-delay:1s;
    }

    .goat3{
      bottom:14%;
      left:50%;
      transform:translateX(-50%);
      animation-delay:2s;
    }

    @keyframes floatGoat{
      0%,100%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-18px);
      }
    }

    /* GIFT */

    .gift-wrapper{
      position:relative;
      width:240px;
      height:260px;
      cursor:pointer;
      animation:giftFloat 3s ease-in-out infinite;
      transition:0.5s;
    }

    .gift-wrapper:hover{
      transform:scale(1.05);
    }

    @keyframes giftFloat{
      0%,100%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-15px);
      }
    }

    /* SPARKLES */

    .sparkles{
      position:absolute;
      width:100%;
      text-align:center;
      top:-45px;
      font-size:2rem;
      animation:sparkle 1.5s infinite alternate;
      color:#facc15;
    }

    @keyframes sparkle{
      from{
        opacity:0.5;
        letter-spacing:2px;
      }

      to{
        opacity:1;
        letter-spacing:10px;
      }
    }

    /* GIFT LID */

    .gift-lid{
      position:absolute;
      width:240px;
      height:65px;
      background:linear-gradient(45deg,#22c55e,#16a34a);
      border-radius:15px;
      top:0;
      z-index:2;
      transition:1s;
      transform-origin:left center;
      box-shadow:0 10px 20px rgba(0,0,0,0.4);
    }

    /* OPEN EFFECT */

    .gift-wrapper.open .gift-lid{
      transform:
      rotate(-25deg)
      translateY(-40px)
      translateX(-20px);
    }

    /* BOX */

    .gift-box{
      position:absolute;
      bottom:0;
      width:240px;
      height:200px;
      background:linear-gradient(135deg,#16a34a,#22c55e);
      border-radius:0 0 20px 20px;
      overflow:hidden;

      box-shadow:
      0 0 40px rgba(34,197,94,0.6),
      0 20px 40px rgba(0,0,0,0.5);
    }

    /* RIBBONS */

    .ribbon-vertical{
      position:absolute;
      width:40px;
      height:100%;
      background:#facc15;
      left:50%;
      transform:translateX(-50%);
    }

    .ribbon-horizontal{
      position:absolute;
      width:100%;
      height:40px;
      background:#facc15;
      top:50%;
      transform:translateY(-50%);
    }

    /* BOW */

    .bow{
      position:absolute;
      width:60px;
      height:60px;
      background:#facc15;
      border-radius:50%;
      top:-18px;
      left:90px;

      box-shadow:
      -40px 0 #facc15,
      40px 0 #facc15;

      animation:bowPulse 1.5s infinite;
    }

    @keyframes bowPulse{
      0%{
        transform:scale(1);
      }

      50%{
        transform:scale(1.1);
      }

      100%{
        transform:scale(1);
      }
    }

    /* ICONS */

    .eid-icon{
      position:absolute;
      font-size:2rem;
      animation:iconFloat 3s infinite ease-in-out;
    }

    .moon-icon{
      top:20px;
      left:20px;
    }

    .goat-icon{
      bottom:20px;
      right:20px;
      animation-delay:1s;
    }

    .star-icon{
      top:70px;
      right:25px;
      animation-delay:2s;
    }

    @keyframes iconFloat{
      0%,100%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-10px);
      }
    }

    /* TEXT */

    .gift-text{
      margin-top:50px;
      font-size:1.6rem;
      color:#facc15;
      text-shadow:0 0 15px #facc15;
      animation:textPulse 2s infinite;
      letter-spacing:2px;
    }

    @keyframes textPulse{
      0%{
        opacity:0.5;
      }

      100%{
        opacity:1;
        letter-spacing:5px;
      }
    }

    /* =========================
       WEBSITE
    ========================== */

    .website{
      opacity:0;
      transform:scale(1.2);
      transition:1.5s;
      pointer-events:none;
    }

    .website.show{
      opacity:1;
      transform:scale(1);
      pointer-events:auto;
    }

    /* MOON */

    .moon{
      position:absolute;
      top:70px;
      right:120px;
      width:140px;
      height:140px;
      background:#fff8dc;
      border-radius:50%;
      box-shadow:0 0 40px #fff5b8;
      animation:moonFloat 4s infinite ease-in-out;
    }

    .moon::after{
      content:'';
      position:absolute;
      top:15px;
      left:30px;
      width:140px;
      height:140px;
      background:#111827;
      border-radius:50%;
    }

    @keyframes moonFloat{
      0%,100%{
        transform:translateY(0);
      }

      50%{
        transform:translateY(-10px);
      }
    }

    /* STARS */

    .star{
      position:absolute;
      width:4px;
      height:4px;
      background:white;
      border-radius:50%;
      animation:twinkle 2s infinite alternate;
    }

    @keyframes twinkle{
      from{
        opacity:0.3;
      }

      to{
        opacity:1;
      }
    }

    /* MAIN CARD */

    .container{
      width:90%;
      max-width:700px;
      padding:50px;
      border-radius:25px;
      text-align:center;
      backdrop-filter:blur(10px);
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.2);
      box-shadow:0 0 30px rgba(0,0,0,0.4);
      animation:cardFloat 4s ease-in-out infinite;
    }

    @keyframes cardFloat{
      0%,100%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-10px);
      }
    }

    h1{
      font-size:4rem;
      color:#facc15;
      margin-bottom:20px;
      text-shadow:0 0 15px rgba(250,204,21,0.8);
      animation:glow 2s infinite alternate;
    }

    @keyframes glow{
      from{
        letter-spacing:2px;
      }

      to{
        letter-spacing:8px;
      }
    }

    h2{
      font-size:2rem;
      margin-bottom:20px;
      color:#ffffff;
    }

    p{
      font-size:1.2rem;
      line-height:1.8;
      color:#e5e7eb;
    }

    .name{
      margin-top:30px;
      font-size:1.5rem;
      color:#22c55e;
      font-weight:bold;
      letter-spacing:2px;
      animation:bounce 2s infinite;
    }

    @keyframes bounce{
      0%,100%{
        transform:translateY(0);
      }

      50%{
        transform:translateY(-5px);
      }
    }

    .emoji{
      font-size:3rem;
      margin-bottom:15px;
      animation:emojiBounce 2s infinite;
    }

    @keyframes emojiBounce{
      0%,100%{
        transform:translateY(0);
      }

      50%{
        transform:translateY(-10px);
      }
    }

    /* MOBILE */

    @media(max-width:768px){

      h1{
        font-size:2.7rem;
      }

      h2{
        font-size:1.4rem;
      }

      p{
        font-size:1rem;
      }

      .container{
        padding:30px;
      }

      .gift-wrapper{
        width:180px;
        height:220px;
      }

      .gift-box{
        width:180px;
        height:160px;
      }

      .gift-lid{
        width:180px;
      }

      .bow{
        left:60px;
      }

    }

  </style>
</head>

<body>

  <!-- =========================
       GIFT SCREEN
  ========================== -->

  <div class="gift-screen" id="giftScreen">

    <div class="gift-glow"></div>

    <div class="goat goat1">🐐</div>
    <div class="goat goat2">🐐</div>
    <div class="goat goat3">🐐</div>

    <div class="gift-wrapper" id="giftBox">

      <div class="sparkles">✨ ✨ ✨</div>

      <div class="gift-lid">
        <div class="ribbon-vertical"></div>
        <div class="ribbon-horizontal"></div>
        <div class="bow"></div>
      </div>

      <div class="gift-box">

        <div class="ribbon-vertical"></div>
        <div class="ribbon-horizontal"></div>

        <div class="eid-icon moon-icon">🌙</div>
        <div class="eid-icon goat-icon">🐐</div>
        <div class="eid-icon star-icon">✨</div>

      </div>

    </div>

    <div class="gift-text">
      Tap To Open Your Eid Surprise 🎁
    </div>

  </div>

  <!-- =========================
       WEBSITE
  ========================== -->

  <div class="website" id="website">

    <!-- Stars -->

    <div class="star" style="top:10%; left:20%;"></div>
    <div class="star" style="top:30%; left:80%;"></div>
    <div class="star" style="top:60%; left:15%;"></div>
    <div class="star" style="top:20%; left:60%;"></div>
    <div class="star" style="top:75%; left:70%;"></div>
    <div class="star" style="top:40%; left:40%;"></div>

    <!-- Moon -->

    <div class="moon"></div>

    <!-- Main Card -->

    <div class="container">

      <div class="emoji">🌙✨🐐</div>

      <h1>Eid-ul-Adha</h1>

      <h2>Bakrid Mubarak</h2>

      <p>
        May Allah fill your life with happiness,
        peace, success and endless blessings
        on this holy occasion.
        <br><br>
        Wishing you and your family a joyful
        and blessed Bakrid!
      </p>

      <div class="name">
        — By Aftab Ansari ❤️
      </div>

    </div>

  </div>

  <!-- SCRIPT -->

  <script>

    const giftBox = document.getElementById("giftBox");

    giftBox.addEventListener("click", () => {

      // Open gift lid
      giftBox.classList.add("open");

      // Hide gift screen
      setTimeout(() => {

        document.getElementById("giftScreen").style.opacity = "0";
        document.getElementById("giftScreen").style.pointerEvents = "none";

      }, 700);

      // Show website
      setTimeout(() => {

        document.getElementById("website").classList.add("show");

      }, 1200);

    });

  </script>

</body>
</html>
